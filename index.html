<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HM MODZ - SUPREME ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root { 
            --accent: #3b82f6; 
            --deep-blue: #020617;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html { 
            background-color: var(--deep-blue); 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            height: 100%;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #particles-js {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .main-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
        }

        .ios-blur { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px) saturate(180%); 
            border: 1px solid var(--border); 
            border-radius: 24px;
        }

        .ios-input { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            color: white; 
            padding: 14px 18px; 
            width: 100%; 
            outline: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 14px;
        }

        .ios-input:focus { 
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
        }

        .nav-container {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px;
            border-radius: 18px;
            border: 1px solid var(--border);
            display: inline-flex;
            gap: 4px;
            align-self: center;
        }

        .nav-tab { 
            position: relative;
            cursor: pointer; 
            padding: 8px 16px; 
            border-radius: 14px; 
            font-size: 10px; 
            font-weight: 800; 
            color: rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
            z-index: 1;
        }

        .nav-tab.active { color: #fff; }

        .nav-indicator {
            position: absolute;
            height: calc(100% - 10px);
            top: 5px;
            left: 5px;
            background: var(--accent);
            border-radius: 13px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-ios {
            background: #fff;
            color: #020617;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 800;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-ios:active { transform: scale(0.96); opacity: 0.9; }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .shield-logo {
            width: 44px;
            height: 44px;
            object-fit: cover;
            border-radius: 12px;
            background: #fff;
        }

        .section-content {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
        }

        .section-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-wrapper">
        <header class="flex flex-col items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://files.catbox.moe/4y3suf.png" alt="Logo" class="shield-logo">
                <div>
                    <h1 class="text-xl font-black tracking-tighter">hmmodz server</h1>
                    <p class="text-blue-500/50 text-[7px] font-bold uppercase tracking-[3px]">Admin Dashboard Server</p>
                </div>
            </div>
            
            <div class="nav-container">
                <div id="nav-indicator" class="nav-indicator"></div>
                <div onclick="switchTab('stream', this)" id="tab-stream" class="nav-tab active">Alert</div>
                <div onclick="switchTab('chat', this)" id="tab-chat" class="nav-tab">Role</div>
                <div onclick="switchTab('accounts', this)" id="tab-accounts" class="nav-tab">User</div>
            </div>
        </header>

        <main class="flex-1 w-full max-w-4xl mx-auto">
            <div id="section-stream" class="section-content active space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="ios-blur p-5">
                        <p class="text-white/20 text-[8px] font-black uppercase tracking-widest mb-1">Live Users</p>
                        <h2 class="text-2xl font-black" id="active-users-stream">0</h2>
                    </div>
                    <div class="ios-blur p-5">
                        <p class="text-white/20 text-[8px] font-black uppercase tracking-widest mb-1">Server</p>
                        <div class="flex items-center gap-2">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                            <span class="text-[10px] font-black text-green-400 uppercase">Live</span>
                        </div>
                    </div>
                </div>

                <div class="ios-blur p-6 space-y-5">
                    <div class="flex justify-between items-center">
                        <h3 class="text-sm font-black uppercase tracking-widest">Broadcast</h3>
                        <div id="status-badge" class="px-3 py-1 rounded-full text-[8px] font-black uppercase bg-red-500/10 text-red-500 border border-red-500/10">Offline</div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="announce-id" class="ios-input" placeholder="ID Update">
                        <div onclick="openSelectModal('display')" class="ios-input flex justify-between items-center cursor-pointer">
                            <span id="display-state-text" class="text-xs opacity-40">Visibility</span>
                            <i class="fa-solid fa-angle-down text-[10px]"></i>
                        </div>
                    </div>
                    <input type="text" id="announce-title" class="ios-input" placeholder="Headline">
                    <input type="text" id="announce-image" class="ios-input" placeholder="Image URL">
                    <textarea id="announce-desc" class="ios-input h-24 resize-none" placeholder="Description..."></textarea>
                    <div class="flex gap-3">
                        <button onclick="updateAnnouncement()" class="btn-ios flex-1 h-12 text-[10px] uppercase tracking-widest">Update</button>
                        <button onclick="killAnnouncement()" class="w-12 h-12 bg-red-500/10 text-red-500 rounded-2xl border border-red-500/10 flex items-center justify-center"><i class="fa-solid fa-power-off"></i></button>
                    </div>
                    <input type="hidden" id="announce-status" value="false">
                </div>
            </div>

            <div id="section-chat" class="section-content max-w-sm mx-auto">
                <div class="ios-blur p-8 space-y-8">
                    <div class="text-center">
                        <div class="w-12 h-12 bg-blue-500/10 rounded-2xl border border-blue-500/10 flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-crown text-blue-500"></i>
                        </div>
                        <h3 class="text-lg font-black uppercase">Role Manager</h3>
                    </div>
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-[8px] font-black text-white/20 uppercase tracking-[2px] ml-1">Target User</label>
                            <input type="text" id="chat-target-user" class="ios-input font-bold" placeholder="@username">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[8px] font-black text-white/20 uppercase tracking-[2px] ml-1">Role Edit</label>
                            <div onclick="openSelectModal('role')" class="ios-input flex justify-between items-center cursor-pointer">
                                <span id="selected-role-text" class="text-xs font-bold text-blue-400">Member</span>
                                <i class="fa-solid fa-chevron-right text-[10px] opacity-20"></i>
                            </div>
                        </div>
                        <input type="hidden" id="chat-target-role" value="Member">
                        <button onclick="updateUserRole()" class="w-full h-14 btn-ios text-[10px] uppercase tracking-widest mt-4">Update Role</button>
                    </div>
                </div>
            </div>

            <div id="section-accounts" class="section-content">
                <div class="ios-blur overflow-hidden">
                    <div class="p-6 border-b border-white/5 flex justify-between items-center">
                        <h3 class="text-xs font-black uppercase tracking-widest">Active Users</h3>
                        <div class="text-[9px] font-black opacity-40 uppercase" id="account-count">0 User</div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <tbody id="user-list-table" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="custom-modal" class="fixed inset-0 z-[10000] hidden flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="ios-blur w-full max-w-xs p-6 translate-y-4 opacity-0 transition-all duration-300" id="modal-container">
            <h4 class="text-[9px] font-black uppercase tracking-widest text-center mb-6 text-white/30">Select Option</h4>
            <div id="modal-options" class="space-y-2"></div>
            <button onclick="closeModal()" class="w-full mt-6 py-3 rounded-xl bg-white/5 font-black text-[9px] uppercase tracking-widest">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const configStream = { apiKey: "AIzaSyA9BxTN24XqHOjB1qQdVa6yYbRjun0Sl8c", databaseURL: "https://cracker-key-default-rtdb.firebaseio.com" };
        const configChat = { apiKey: "AIzaSyDHO6Ssuqx723r2DTMEmZV2kON8iM1yf0c", databaseURL: "https://key-server-chat-default-rtdb.firebaseio.com" };
        const appStream = firebase.initializeApp(configStream, "stream");
        const appChat = firebase.initializeApp(configChat, "chat");
        const dbStream = appStream.database(), dbChat = appChat.database();

        particlesJS("particles-js", {
            particles: {
                number: { value: 60 },
                color: { value: "#3b82f6" },
                opacity: { value: 0.2 },
                size: { value: 2 },
                line_linked: { enable: true, distance: 150, color: "#3b82f6", opacity: 0.1, width: 1 },
                move: { enable: true, speed: 1 }
            }
        });

        function switchTab(type, el) {
            const indicator = document.getElementById('nav-indicator');
            const tabs = document.querySelectorAll('.nav-tab');
            tabs.forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            indicator.style.width = `${el.offsetWidth}px`;
            indicator.style.left = `${el.offsetLeft}px`;
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${type}`).classList.add('active');
            if(type === 'accounts') loadUserAccounts();
        }

        function openSelectModal(type) {
            const modal = document.getElementById('custom-modal');
            const container = document.getElementById('modal-container');
            const optionsBox = document.getElementById('modal-options');
            optionsBox.innerHTML = '';
            modal.classList.remove('hidden');
            setTimeout(() => { container.classList.add('translate-y-0', 'opacity-100'); }, 10);
            if(type === 'display') {
                [{ l: 'Visible', v: 'true' }, { l: 'Hidden', v: 'false' }].forEach(o => {
                    optionsBox.innerHTML += `<div onclick="selectDisplay('${o.l}', '${o.v}')" class="p-4 rounded-xl bg-white/[0.03] border border-white/5 hover:bg-blue-600 transition-all cursor-pointer text-center text-[10px] font-black uppercase">${o.l}</div>`;
                });
            } else {
                ['Owner Of hmmodz', 'Admin hmmodz', 'Member', 'Blacklist Human'].forEach(r => {
                    optionsBox.innerHTML += `<div onclick="selectRole('${r}')" class="p-4 rounded-xl bg-white/[0.03] border border-white/5 hover:bg-blue-600 transition-all cursor-pointer text-center text-[10px] font-black uppercase">${r}</div>`;
                });
            }
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            const container = document.getElementById('modal-container');
            container.classList.remove('translate-y-0', 'opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function selectDisplay(l, v) {
            document.getElementById('announce-status').value = v;
            document.getElementById('display-state-text').innerText = l;
            updateBadge(); closeModal();
        }

        function selectRole(r) {
            document.getElementById('chat-target-role').value = r;
            document.getElementById('selected-role-text').innerText = r;
            closeModal();
        }

        function updateBadge() {
            const s = document.getElementById('announce-status').value === 'true';
            const b = document.getElementById('status-badge');
            b.innerText = s ? 'Live' : 'Offline';
            b.className = s ? "px-3 py-1 rounded-full text-[8px] font-black uppercase bg-green-500/10 text-green-400 border border-green-500/10" : "px-3 py-1 rounded-full text-[8px] font-black uppercase bg-red-500/10 text-red-500 border border-red-500/10";
        }

        function updateAnnouncement() {
            dbStream.ref('app_announcement').update({
                id: document.getElementById('announce-id').value || Date.now().toString(),
                title: document.getElementById('announce-title').value,
                image_url: document.getElementById('announce-image').value,
                description: document.getElementById('announce-desc').value,
                show: document.getElementById('announce-status').value === 'true'
            }).then(() => Swal.fire({ title: 'Success', icon: 'success', background: '#0f172a', color: '#fff' }));
        }

        function killAnnouncement() {
            dbStream.ref('app_announcement').update({ show: false }).then(() => {
                document.getElementById('announce-status').value = 'false';
                document.getElementById('display-state-text').innerText = 'Hidden';
                updateBadge();
            });
        }

        async function updateUserRole(uFromList) {
            let user = uFromList || document.getElementById('chat-target-user').value.trim().toLowerCase().replace('@', '');
            const role = document.getElementById('chat-target-role').value;
            if(!user) return;
            const snap = await dbChat.ref('usernames/' + user).get();
            if(!snap.exists()) return Swal.fire({ title: 'Error', text: 'Not Found', icon: 'error', background: '#0f172a', color: '#fff' });
            await dbChat.ref('users/' + snap.val() + '/role').set(role);
            Swal.fire({ title: 'Synced', icon: 'success', background: '#0f172a', color: '#fff' });
            if(uFromList) loadUserAccounts();
        }

        async function loadUserAccounts() {
            const table = document.getElementById('user-list-table');
            table.innerHTML = '<div class="p-10 text-center opacity-20 text-[8px] font-black uppercase">Loading...</div>';
            const usersSnap = await dbChat.ref('users').get();
            const usernamesSnap = await dbChat.ref('usernames').get();
            if(!usersSnap.exists()) return;
            const users = usersSnap.val();
            const usernames = usernamesSnap.val();
            const namesMap = {};
            for(let name in usernames) namesMap[usernames[name]] = name;
            table.innerHTML = '';
            let count = 0;
            for(let uid in users) {
                count++;
                const u = users[uid];
                const name = namesMap[uid] || '---';
                const role = u.role || 'Member';
                let c = "text-blue-400 bg-blue-500/5";
                if(role.includes('Owner')) c = "text-yellow-500 bg-yellow-500/5";
                if(role.includes('Admin')) c = "text-orange-500 bg-orange-500/5";
                table.innerHTML += `<tr class="group"><td class="px-6 py-4 text-xs font-bold">@${name}</td><td class="px-6 py-4 text-center"><span class="role-badge ${c}">${role}</span></td><td class="px-6 py-4 text-right"><button onclick="editFromTable('${name}')" class="text-[8px] font-black bg-white text-black px-3 py-2 rounded-lg uppercase">Edit</button></td></tr>`;
            }
            document.getElementById('account-count').innerText = `${count} Entities`;
        }

        function editFromTable(name) {
            document.getElementById('chat-target-user').value = name;
            switchTab('chat', document.getElementById('tab-chat'));
        }

        window.onload = () => {
            const firstTab = document.getElementById('tab-stream');
            const indicator = document.getElementById('nav-indicator');
            indicator.style.width = `${firstTab.offsetWidth}px`;
            indicator.style.left = `${firstTab.offsetLeft}px`;
            dbStream.ref('online_users').on('value', s => document.getElementById('active-users-stream').innerText = s.numChildren());
        };
    </script>
</body>
</html>
