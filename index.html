<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM MODZ DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #007AFF; --bg: #000205; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        body { background-color: var(--bg); background-image: radial-gradient(circle at 0% 0%, rgba(0, 122, 255, 0.15) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(88, 86, 214, 0.1) 0%, transparent 40%); background-attachment: fixed; color: #fff; font-family: -apple-system, sans-serif; margin: 0; overflow-x: hidden; }
        .glass-card { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--border); border-radius: 28px; }
        .pulse-live { width: 10px; height: 10px; background: #10b981; border-radius: 50%; position: relative; }
        .pulse-live::after { content: ''; position: absolute; inset: -4px; border: 2px solid #10b981; border-radius: 50%; animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .ios-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; padding: 16px; width: 100%; outline: none; transition: 0.3s; font-size: 14px; }
        .ios-input:focus { border-color: var(--accent); }
        .nav-tab { cursor: pointer; padding: 10px 20px; border-radius: 12px; font-size: 10px; font-weight: 800; letter-spacing: 1px; transition: 0.3s; border: 1px solid transparent; opacity: 0.4; }
        .nav-tab.active { opacity: 1; background: rgba(0,122,255,0.1); border-color: rgba(0,122,255,0.3); color: var(--accent); }
        .activity-log { height: 300px; overflow-y: auto; scrollbar-width: none; }
        .activity-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="auth-screen">
        <div class="glass-card p-8 w-full max-w-sm text-center">
            <img src="https://files.catbox.moe/4y3suf.png" class="w-20 h-20 rounded-[22px] mx-auto mb-6 shadow-2xl">
            <h2 class="text-2xl font-black tracking-tighter mb-2">HM ADMIN</h2>
            <p class="text-white/40 text-[10px] font-bold uppercase tracking-[3px] mb-8">Secure Authentication</p>
            <div class="space-y-4">
                <input type="password" id="admin-pass" class="ios-input text-center" placeholder="Admin Password">
                <button onclick="checkAuth()" class="w-full h-14 bg-blue-500 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Sign In</button>
            </div>
        </div>
    </div>

    <div id="dashboard-content" class="hidden max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter">HM <span class="text-blue-500 not-italic uppercase text-sm">Real-time</span></h1>
                <p class="text-white/40 text-[10px] font-bold uppercase tracking-[3px] mt-1">Console Dashboard</p>
            </div>
            <div class="flex gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/5">
                <div onclick="switchTab('stream')" id="tab-stream" class="nav-tab active">HM STREAM</div>
                <div onclick="switchTab('chat')" id="tab-chat" class="nav-tab">CHAT SERVER</div>
            </div>
        </header>

        <div id="section-stream" class="space-y-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-card p-6 border-l-4 border-blue-500">
                    <p class="text-white/40 text-[9px] font-bold uppercase tracking-widest">Active Streamers</p>
                    <h2 class="text-4xl font-black mt-1" id="active-users-stream">0</h2>
                </div>
                <div class="glass-card p-6">
                    <p class="text-white/40 text-[9px] font-bold uppercase tracking-widest">Server Ping</p>
                    <h2 class="text-4xl font-black mt-1 text-green-500" id="ping-val">24<span class="text-xs opacity-20 ml-1">MS</span></h2>
                </div>
                <div class="glass-card p-6">
                    <p class="text-white/40 text-[9px] font-bold uppercase tracking-widest">API Status</p>
                    <h2 class="text-4xl font-black mt-1 text-blue-400">LIVE</h2>
                </div>
                <div class="glass-card p-6">
                    <p class="text-white/40 text-[9px] font-bold uppercase tracking-widest">Server Condition</p>
                    <h2 class="text-4xl font-black mt-1 text-pink-500">Online</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 glass-card p-8">
                    <h3 class="text-lg font-bold tracking-tight mb-6">Announcement Control</h3>
                    <div class="space-y-4">
                        <input type="text" id="announce-title" class="ios-input" placeholder="Title">
                        <input type="text" id="announce-image" class="ios-input" placeholder="Image URL">
                        <textarea id="announce-desc" class="ios-input h-24 resize-none" placeholder="Description"></textarea>
                        <button onclick="updateAnnouncement()" class="w-full h-14 bg-blue-600 rounded-2xl font-black text-xs uppercase tracking-widest">Broadcast Update</button>
                    </div>
                </div>
                <div class="glass-card p-8">
                    <h3 class="text-lg font-bold tracking-tight mb-6">Live Traffic</h3>
                    <div class="h-[200px]"><canvas id="liveChart"></canvas></div>
                </div>
            </div>
        </div>

        <div id="section-chat" class="hidden space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="glass-card p-8">
                    <h3 class="text-lg font-bold tracking-tight mb-2">User Management</h3>
                    <p class="text-white/20 text-[10px] uppercase font-bold tracking-widest mb-8">Modify User</p>
                    <div class="space-y-4">
                        <input type="text" id="chat-target-user" class="ios-input" placeholder="@username">
                        <select id="chat-target-role" class="ios-input">
                            <option value="Member">Member</option>
                            <option value="Admin hmmodz">Admin</option>
                            <option value="Owner Of hmmodz">Owner Of hmmodz</option>
                            <option value="Blacklist Human">Blacklist (Banned)</option>
                        </select>
                        <button onclick="updateUserRole()" class="w-full h-14 bg-indigo-600 rounded-2xl font-black text-xs uppercase tracking-widest">Update User Role</button>
                    </div>
                </div>

                <div class="lg:col-span-2 glass-card p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold tracking-tight">Live Chat Activity</h3>
                        <span class="text-[10px] font-black bg-white/5 px-3 py-1 rounded-full border border-white/5" id="total-messages">0 Messages</span>
                    </div>
                    <div class="activity-log" id="chat-log-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const configStream = { apiKey: "AIzaSyA9BxTN24XqHOjB1qQdVa6yYbRjun0Sl8c", authDomain: "cracker-key.firebaseapp.com", databaseURL: "https://cracker-key-default-rtdb.firebaseio.com", projectId: "cracker-key" };
        const configChat = { apiKey: "AIzaSyDHO6Ssuqx723r2DTMEmZV2kON8iM1yf0c", authDomain: "key-server-chat.firebaseapp.com", databaseURL: "https://key-server-chat-default-rtdb.firebaseio.com", projectId: "key-server-chat" };

        const appStream = firebase.initializeApp(configStream, "stream");
        const appChat = firebase.initializeApp(configChat, "chat");
        const dbStream = appStream.database();
        const dbChat = appChat.database();

        function checkAuth() {
            if(document.getElementById('admin-pass').value === "hmmodzvip") {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('dashboard-content').classList.remove('hidden');
                initSystem();
            } else { alert("Password Salah!"); }
        }

        function switchTab(type) {
            const sStream = document.getElementById('section-stream');
            const sChat = document.getElementById('section-chat');
            const tStream = document.getElementById('tab-stream');
            const tChat = document.getElementById('tab-chat');

            if(type === 'stream') {
                sStream.classList.remove('hidden'); sChat.classList.add('hidden');
                tStream.classList.add('active'); tChat.classList.remove('active');
            } else {
                sStream.classList.add('hidden'); sChat.classList.remove('hidden');
                tStream.classList.remove('active'); tChat.classList.add('active');
            }
        }

        function initSystem() {
            dbStream.ref('online_users').on('value', s => { document.getElementById('active-users-stream').innerText = s.numChildren(); });
            
            dbChat.ref('global_chat_v7').limitToLast(20).on('value', s => {
                const list = document.getElementById('chat-log-list');
                const total = document.getElementById('total-messages');
                list.innerHTML = '';
                let count = 0;
                s.forEach(snap => {
                    const d = snap.val();
                    list.innerHTML = `<div class="activity-item">
                        <span class="text-blue-500 font-bold">@${d.user || d.name}</span>: 
                        <span class="text-white/70">${d.msg}</span>
                        <div class="text-[8px] text-white/20 mt-1">${new Date(d.time).toLocaleTimeString()}</div>
                    </div>` + list.innerHTML;
                    count++;
                });
                total.innerText = count + " Recent Msgs";
            });

            initChart();
        }

        async function updateUserRole() {
            let user = document.getElementById('chat-target-user').value.trim().toLowerCase();
            if(user.startsWith('@')) user = user.substring(1);
            const role = document.getElementById('chat-target-role').value;

            if(!user) return Swal.fire('Error', 'Input Username!', 'error');

            const snap = await dbChat.ref('usernames/' + user).get();
            if(!snap.exists()) return Swal.fire('Not Found', 'User tidak terdaftar!', 'error');

            await dbChat.ref('users/' + snap.val() + '/role').set(role);
            Swal.fire('Success', `@${user} updated to ${role}`, 'success');
            document.getElementById('chat-target-user').value = '';
        }

        function updateAnnouncement() {
            dbStream.ref('app_announcement').update({
                title: document.getElementById('announce-title').value,
                image_url: document.getElementById('announce-image').value,
                description: document.getElementById('announce-desc').value,
                show: true
            }).then(() => alert("Broadcast Success!"));
        }

        function initChart() {
            const ctx = document.getElementById('liveChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1', '2', '3', '4', '5'],
                    datasets: [{ data: [12, 19, 15, 25, 20], borderColor: '#007AFF', tension: 0.4, fill: true, backgroundColor: 'rgba(0,122,255,0.1)' }]
                },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }
    </script>
</body>
</html>
